<!DOCTYPE html>
<html lang="pt-br">
<head>
    <title>Formulário HTML</title>
    <meta charset="UTF-8">
</head>
<body>
    <h1>Cadastro de Usuário</h1>
    <from action="cadastro.php" method="GET">
        <label for="nome">Nome:</label>
        <input type="text" id="nome" name="nome">
        <br>
        <label for="email">E-mail:</label>
        <input type="email" id="email" name="email">
        <br>
        <label for="senha">Senha:</label>
        <input type="password" id="senha" name="senha">
        <br>
        <label for="data">Data de Nascimento</label>
        <input type="date" id="nascimento" name="nascimento">
        <br>
        <p>Turno:</p>
        <input type="radio" id="turno" name="manha"> <label for="manha">Manha</label>
        <input type="radio" id="turno" name="tarde"> <label for="tarde">Tarde</label>
        <input type="radio" id="turno" name="noite"> <label for="noite">Noite</label>
        <br>
        <p>Áreas de interesse:</p>
        <input type="checkbox" id="programacao" name="area"> <label for="programacao">programação</label>
        <input type="checkbox" id="design" name="area"> <label for="design">redes</label>
        <input type="checkbox" id="redes" name="area"> <label for="redes">redes</label>
        <br>
        <input type="submit" value="Enviar">
        <input type="reset" value="Limpar">
</body>
</html>
